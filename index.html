<!-- Fully Optimized SafeTap Dashboard Interface -->
<div class="dashboard-container" style="background-color: #1a2230; padding: 25px; border-radius: 16px; font-family: sans-serif; color: white; text-align: center; max-width: 400px; margin: auto; box-shadow: 0 4px 30px rgba(0,0,0,0.3);">
    <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px;">
        <span style="font-size: 24px;">🛡️</span>
        <h2 style="margin: 0; font-size: 22px; letter-spacing: 0.5px;">SafeTap Dashboard</h2>
    </div>
    
    <!-- Heavy Duty Interactive SOS Core Trigger -->
    <div style="position: relative; width: 220px; height: 220px; margin: 30px auto;">
        <div id="glowRing" style="position: absolute; top:0; left:0; right:0; bottom:0; border-radius: 50%; background-color: rgba(239, 68, 68, 0.2); transform: scale(1); transition: all 0.3s ease;"></div>
        <button id="sosButton" style="position: absolute; top:10px; left:10px; width: 200px; height: 200px; border-radius: 50%; background-color: #ef4444; color: white; font-size: 22px; font-weight: 900; border: none; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5); -webkit-user-select: none; user-select: none;">
            TAP & HOLD SOS
        </button>
    </div>
    
    <div id="statusIndicator" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px;">
        <span id="statusDot" style="width: 10px; height: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981;"></span>
        <p id="statusText" style="color: #60a5fa; margin: 0; font-size: 14px; font-weight: 600;">📡 GPS Signal Ready</p>
    </div>

    <!-- Enhanced Secure Contacts Panel -->
    <div style="background-color: #111827; padding: 18px; border-radius: 12px; margin-top: 25px; text-align: left; border: 1px solid #1f2937;">
        <h3 style="margin-top: 0; font-size: 15px; color: #9ca3af; margin-bottom: 12px; font-weight: 600;">Registered Responders</h3>
        <input type="tel" id="contact1" placeholder="Primary Contact Phone Number" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #374151; background-color: #1f2937; color: white; box-sizing: border-box; font-size: 14px;">
        <input type="tel" id="contact2" placeholder="Backup Contact Phone Number" style="width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 6px; border: 1px solid #374151; background-color: #1f2937; color: white; box-sizing: border-box; font-size: 14px;">
        <button id="saveContactsBtn" style="width: 100%; padding: 14px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 15px; transition: background 0.2s;">Save Operational Data</button>
    </div>
</div>

<!-- SDK Links -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // 1. DYNAMIC CONFIGURATION HOLDER
    // Copy-paste your exact original Firebase account data values inside these quotes:
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const database = firebase.database();

    // Elements
    let pressTimer;
    let watchId = null;
    let isSOSActive = false;
    const sosButton = document.getElementById('sosButton');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const glowRing = document.getElementById('glowRing');
    const contact1Input = document.getElementById('contact1');
    const contact2Input = document.getElementById('contact2');
    const saveBtn = document.getElementById('saveContactsBtn');

    window.onload = function() {
        if(localStorage.getItem('safetap_c1')) contact1Input.value = localStorage.getItem('safetap_c1');
        if(localStorage.getItem('safetap_c2')) contact2Input.value = localStorage.getItem('safetap_c2');
        syncOfflineCache(); // Run offline sync checks immediately
    };

    saveBtn.addEventListener('click', () => {
        localStorage.setItem('safetap_c1', contact1Input.value);
        localStorage.setItem('safetap_c2', contact2Input.value);
        alert('Emergency profile updated and locked.');
    });

    // Touch and Gesture Controls 
    sosButton.addEventListener('mousedown', startPress);
    sosButton.addEventListener('touchstart', startPress);
    sosButton.addEventListener('mouseup', cancelPress);
    sosButton.addEventListener('touchend', cancelPress);

    function startPress(e) {
        if(isSOSActive) return;
        e.preventDefault();
        let secondsLeft = 3;
        sosButton.innerText = `HOLD ${secondsLeft}s`;
        sosButton.style.transform = "scale(0.92)";
        glowRing.style.transform = "scale(1.2)";
        glowRing.style.backgroundColor = "rgba(239, 68, 68, 0.4)";
        
        pressTimer = setInterval(() => {
            secondsLeft--;
            if (secondsLeft <= 0) {
                clearInterval(pressTimer);
                triggerEmergencySOS();
            } else {
                sosButton.innerText = `HOLD ${secondsLeft}s`;
            }
        }, 1000);
    }

    function cancelPress() {
        if (isSOSActive) return;
        clearInterval(pressTimer);
        sosButton.innerText = "TAP & HOLD SOS";
        sosButton.style.transform = "scale(1)";
        glowRing.style.transform = "scale(1)";
        glowRing.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
    }

    // 2. STABLE HIGH-PRECISION RUNTIME ENGINE
    function triggerEmergencySOS() {
        isSOSActive = true;
        sosButton.style.backgroundColor = "#111827";
        sosButton.style.borderColor = "#ef4444";
        sosButton.style.borderWidth = "2px";
        sosButton.style.borderStyle = "solid";
        sosButton.innerText = "🚨 LIVE";
        
        statusDot.style.backgroundColor = "#ef4444";
        statusDot.style.boxShadow = "0 0 10px #ef4444";
        statusText.style.color = "#ef4444";
        statusText.innerText = "SOS ACTIVATED. TRACKING ENGINE ON.";
        
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

        if (navigator.geolocation) {
            // High-Precision Snapshot 
            navigator.geolocation.getCurrentPosition(processLocationUpdate, handleGeoError, {
                enableHighAccuracy: true,
                timeout: 5000
            });

            // Live Moving Tracker (Updates automatically as the user moves)
            watchId = navigator.geolocation.watchPosition(processLocationUpdate, handleGeoError, {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0 // Force fresh phone sensor readings instantly
            });
        } else {
            statusText.innerText = "❌ Built-in Hardware GPS Missing.";
        }
    }

    // 3. FAULT-TOLERANT CLOUD ROUTER
    function processLocationUpdate(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = position.coords.accuracy;
        
        statusText.innerText = `Tracking Active (${accuracy.toFixed(0)}m accuracy)`;

        const alertPayload = {
            latitude: lat,
            longitude: lng,
            timestamp: new Date().toISOString(),
            googleMapsLink: `https://google.com{lat},${lng}`,
            recipients: [localStorage.getItem('safetap_c1') || "Unset", localStorage.getItem('safetap_c2') || "Unset"],
            status: "User is Moving"
        };

        // Try syncing to Firebase
        if (navigator.onLine) {
            database.ref('active_alerts/user_emergency').set(alertPayload)
            .then(() => syncOfflineCache()) // Push any old cached positions
            .catch(() => storeOfflineCache(alertPayload)); // Fail-safe cache
        } else {
            storeOfflineCache(alertPayload);
        }
    }

    // Backup coordinates to local phone memory if mobile service dips
    function storeOfflineCache(payload) {
        localStorage.setItem('safetap_offline_alert', JSON.stringify(payload));
        statusText.innerText = "⚠️ Signal Low. Tracking saved to memory offline.";
    }

    // Automatically empty out local cache to Firebase once network coverage returns
    function syncOfflineCache() {
        const cachedAlert = localStorage.getItem('safetap_offline_alert');
        if (cachedAlert && navigator.onLine) {
            const data = JSON.parse(cachedAlert);
            data.status = "Recovered from Offline Path";
            database.ref('active_alerts/user_emergency_history').push(data).then(() => {
                localStorage.removeItem('safetap_offline_alert');
                console.log("Offline pipeline cleanly synced.");
            });
        }
    }

    // Listen for cellular data restoration cycles dynamically
    window.addEventListener('online', syncOfflineCache);

    function handleGeoError(error) {
        // Battery saving switchover logic
        if (error.code === error.TIMEOUT && isSOSActive) {
            navigator.geolocation.getCurrentPosition(processLocationUpdate, null, {
                enableHighAccuracy: false // Switch to cellular network towers to save battery and track
            });
        }
        console.warn("Sensor delay minimized automatically.");
    }
</script>
